<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopee Affiliate Link</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
  .card { background: #fff; border-radius: 16px; padding: 2rem; max-width: 500px; width: 100%; box-shadow: 0 2px 16px rgba(0,0,0,0.09); }
  .header { display: flex; align-items: center; gap: 12px; margin-bottom: 1.5rem; }
  .logo { width: 46px; height: 46px; background: #fff0ee; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
  h1 { font-size: 17px; font-weight: 700; color: #1a1a1a; }
  .sub { font-size: 12px; color: #999; margin-top: 2px; }
  .af-badge { margin-left: auto; background: #e8f5e9; color: #2e7d32; font-size: 11px; font-weight: 600; padding: 5px 10px; border-radius: 99px; white-space: nowrap; flex-shrink: 0; }

  .local-warn { background: #fff3e0; border: 1.5px solid #ffb74d; border-radius: 10px; padding: 12px 14px; font-size: 13px; color: #e65100; margin-bottom: 1.25rem; line-height: 1.6; display: none; }
  .local-warn strong { display: block; margin-bottom: 4px; }
  .local-warn a { color: #e65100; font-weight: 700; }

  label { display: block; font-size: 13px; color: #444; margin-bottom: 7px; font-weight: 600; }
  textarea { width: 100%; padding: 12px 14px; border: 2px solid #efefef; border-radius: 12px; font-size: 13px; font-family: inherit; outline: none; background: #fafafa; resize: vertical; min-height: 100px; transition: border-color 0.15s; line-height: 1.6; }
  textarea:focus { border-color: #ee4d2d; background: #fff; }
  .found-box { margin-top: 8px; padding: 9px 12px; background: #e3f2fd; border-radius: 8px; font-size: 12px; color: #1565c0; word-break: break-all; display: none; line-height: 1.5; }
  .status { font-size: 12px; margin-top: 6px; min-height: 16px; }
  .ok { color: #2e7d32; }
  .err { color: #c62828; }

  .two-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 1rem; }
  .btn-copy-main, .btn-open-main { padding: 14px; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.15s; }
  .btn-copy-main { background: #fff; color: #ee4d2d; border: 2px solid #ee4d2d; }
  .btn-copy-main:hover { background: #fff5f3; }
  .btn-copy-main:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-copy-main.copied { background: #e8f5e9; color: #2e7d32; border-color: #2e7d32; }
  .btn-open-main { background: #ee4d2d; color: #fff; border: 2px solid #ee4d2d; }
  .btn-open-main:hover { background: #d84315; border-color: #d84315; }
  .btn-open-main:disabled { opacity: 0.4; cursor: not-allowed; }

  .loading { display: none; text-align: center; padding: 1.25rem 0; color: #888; font-size: 13px; }
  .spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid #eee; border-top-color: #ee4d2d; border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 8px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-step { font-size: 12px; color: #bbb; margin-top: 4px; }

  .result-section { display: none; margin-top: 1.25rem; }
  .result-card { background: #f9fbe7; border: 2px solid #c5e1a5; border-radius: 12px; padding: 14px 16px; }
  .result-top { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .result-label { font-size: 11px; font-weight: 700; color: #558b2f; letter-spacing: 0.5px; text-transform: uppercase; }
  .result-url { font-size: 12px; font-family: monospace; color: #1a1a1a; word-break: break-all; line-height: 1.6; }

  .err-box { display: none; margin-top: 1rem; background: #fce4ec; border: 1.5px solid #f48fb1; border-radius: 10px; padding: 12px 14px; font-size: 13px; color: #880e4f; line-height: 1.7; }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="logo">🛍️</div>
    <div>
      <h1>Shopee Affiliate Link</h1>
      <div class="sub">วาง link หรือข้อความ → กดปุ่มเดียว</div>
    </div>
    <div class="af-badge">✓ ID: 15385740436</div>
  </div>

  <div class="local-warn" id="local-warn">
    <strong>⚠️ เปิดจากไฟล์ในเครื่อง — บางฟีเจอร์ใช้ไม่ได้</strong>
    กรุณาเข้าใช้งานผ่าน GitHub Pages แทนครับ:<br>
    <a href="https://sornzilla.github.io/SPAFF/" target="_blank">👉 sornzilla.github.io/SPAFF/</a>
  </div>

  <div>
    <label>วาง link หรือข้อความจาก Shopee</label>
    <textarea id="raw-input" placeholder="วางได้ทุกรูปแบบ เช่น&#10;https://th.shp.ee/pJc99Pr&#10;หรือข้อความแชร์ยาวๆ ที่มี link อยู่ด้านใน"></textarea>
    <div class="status" id="url-status"></div>
    <div class="found-box" id="found-box"></div>
  </div>

  <div class="two-btns">
    <button class="btn-copy-main" id="btn-copy-main" onclick="convertAndCopy()">📋 Copy Link</button>
    <button class="btn-open-main" id="btn-open-main" onclick="convertAndOpen()">🛒 เปิด Link</button>
  </div>

  <div class="loading" id="loading">
    <div><span class="spinner"></span> กำลังดึง link จริง...</div>
    <div class="loading-step" id="loading-step">กำลังเชื่อมต่อ</div>
  </div>

  <div class="result-section" id="result-section">
    <div class="result-card">
      <div class="result-top">
        <span class="result-label">✅ Affiliate link พร้อมแล้ว</span>
      </div>
      <div class="result-url" id="result-url"></div>
    </div>
  </div>

  <div class="err-box" id="err-box"></div>
</div>

<script>
const AF_ID = '15385740436';
let finalAffLink = '';

if (location.protocol === 'file:') {
  document.getElementById('local-warn').style.display = 'block';
}

const SHOPEE_PATTERNS = [
  /https?:\/\/th\.shp\.ee\/[^\s"'）】』<>\n.,!?]+/,
  /https?:\/\/shope\.ee\/[^\s"'）】』<>\n.,!?]+/,
  /https?:\/\/s\.shopee\.co\.th\/[^\s"'）】』<>\n.,!?]+/,
  /https?:\/\/shopee\.co\.th\/[^\s"'）】』<>\n.,!?]+/,
  /https?:\/\/[\w.-]*shopee[\w.-]*\/[^\s"'）】』<>\n.,!?]+/,
];

function extractShopeeUrl(text) {
  for (const p of SHOPEE_PATTERNS) {
    const m = text.match(p);
    if (m) return m[0];
  }
  return null;
}

function isShortLink(url) {
  return /th\.shp\.ee|shope\.ee/.test(url) ||
         /s\.shopee\.co\.th\/[A-Za-z0-9]{5,12}$/.test(url);
}

function addAffiliate(url) {
  try {
    const u = new URL(url);
    u.searchParams.set('af_id', AF_ID);
    return u.toString();
  } catch {
    const sep = url.includes('?') ? '&' : '?';
    return url + sep + 'af_id=' + AF_ID;
  }
}

function parseShopeeUrlFromHtml(html) {
  const patterns = [
    /property="og:url"\s+content="([^"]+shopee[^"]+)"/,
    /content="([^"]+shopee\.co\.th[^"]+)"\s+property="og:url"/,
    /"canonical"\s+href="([^"]+shopee\.co\.th[^"]+)"/,
    /href="([^"]+shopee\.co\.th\/product\/[^"]+)"/,
  ];
  for (const p of patterns) {
    const m = html.match(p);
    if (m && m[1].includes('shopee.co.th')) return m[1];
  }
  return null;
}

async function tryAllOrigins(url) {
  const r = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent(url), { signal: AbortSignal.timeout(8000) });
  const d = await r.json();
  if (d.status && d.status.url && d.status.url.includes('shopee.co.th')) return d.status.url;
  if (d.contents) {
    const parsed = parseShopeeUrlFromHtml(d.contents);
    if (parsed) return parsed;
  }
  throw new Error('allorigins: ไม่พบ URL');
}

async function tryCorsProxy(url) {
  const r = await fetch('https://corsproxy.io/?' + encodeURIComponent(url), { signal: AbortSignal.timeout(8000) });
  const html = await r.text();
  const parsed = parseShopeeUrlFromHtml(html);
  if (parsed) return parsed;
  throw new Error('corsproxy: ไม่พบ URL');
}

async function tryCodeTabs(url) {
  const r = await fetch('https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(url), { signal: AbortSignal.timeout(8000) });
  const html = await r.text();
  const parsed = parseShopeeUrlFromHtml(html);
  if (parsed) return parsed;
  throw new Error('codetabs: ไม่พบ URL');
}

async function expandShortUrl(shortUrl) {
  const steps = [
    { fn: tryAllOrigins, name: 'กำลังดึง link (วิธีที่ 1)...' },
    { fn: tryCorsProxy,  name: 'กำลังดึง link (วิธีที่ 2)...' },
    { fn: tryCodeTabs,   name: 'กำลังดึง link (วิธีที่ 3)...' },
  ];
  const stepEl = document.getElementById('loading-step');
  for (const step of steps) {
    try {
      stepEl.textContent = step.name;
      const result = await step.fn(shortUrl);
      if (result) return result;
    } catch (e) {
      console.warn(step.name, e.message);
    }
  }
  throw new Error('ดึง link ไม่ได้ทั้ง 3 วิธี');
}

document.getElementById('raw-input').addEventListener('input', function() {
  const val = this.value.trim();
  const s = document.getElementById('url-status');
  const fb = document.getElementById('found-box');
  document.getElementById('result-section').style.display = 'none';
  document.getElementById('err-box').style.display = 'none';
  if (!val) { s.textContent = ''; s.className = 'status'; fb.style.display = 'none'; return; }
  const found = extractShopeeUrl(val);
  if (found) {
    s.textContent = isShortLink(found) ? '✓ พบ short link — จะดึง link จริงให้อัตโนมัติ' : '✓ พบ link สินค้า Shopee';
    s.className = 'status ok';
    fb.textContent = '🔗 ' + found;
    fb.style.display = 'block';
  } else {
    s.textContent = 'ไม่พบ link ของ Shopee ในข้อความนี้';
    s.className = 'status err';
    fb.style.display = 'none';
  }
});

function setButtonsDisabled(disabled) {
  document.getElementById('btn-copy-main').disabled = disabled;
  document.getElementById('btn-open-main').disabled = disabled;
}

async function doConvert() {
  const raw = document.getElementById('raw-input').value.trim();
  if (!raw) { alert('กรุณาวาง link หรือข้อความก่อนนะครับ'); return null; }
  const url = extractShopeeUrl(raw);
  if (!url) { alert('ไม่พบ link ของ Shopee ในข้อความนี้'); return null; }

  const loading = document.getElementById('loading');
  const resultSection = document.getElementById('result-section');
  const errBox = document.getElementById('err-box');

  setButtonsDisabled(true);
  loading.style.display = 'block';
  resultSection.style.display = 'none';
  errBox.style.display = 'none';

  try {
    let fullUrl = url;
    if (isShortLink(url)) fullUrl = await expandShortUrl(url);
    finalAffLink = addAffiliate(fullUrl);
    document.getElementById('result-url').textContent = finalAffLink;
    resultSection.style.display = 'block';
    return finalAffLink;
  } catch (e) {
    errBox.innerHTML =
      '⚠️ <strong>ดึง link ไม่ได้</strong><br>' +
      (location.protocol === 'file:'
        ? 'เปิดไฟล์นี้จากเครื่องโดยตรง กรุณาเข้าผ่าน <a href="https://sornzilla.github.io/SPAFF/" style="color:#880e4f;font-weight:700">sornzilla.github.io/SPAFF/</a> แทนครับ'
        : 'ลองใหม่อีกครั้ง หรือเปิด short link ในเบราว์เซอร์แล้วก๊อป URL ที่ยาวขึ้นมาวางแทนได้ครับ');
    errBox.style.display = 'block';
    return null;
  } finally {
    setButtonsDisabled(false);
    loading.style.display = 'none';
  }
}

async function convertAndCopy() {
  const link = await doConvert();
  if (!link) return;
  const btn = document.getElementById('btn-copy-main');
  navigator.clipboard.writeText(link).then(() => {
    btn.textContent = '✓ คัดลอกแล้ว!';
    btn.className = 'btn-copy-main copied';
    setTimeout(() => {
      btn.textContent = '📋 Copy Link';
      btn.className = 'btn-copy-main';
    }, 2000);
  });
}

async function convertAndOpen() {
  const link = await doConvert();
  if (!link) return;
  openInBrowser(link);
}

function openInBrowser(url) {
  // Try anchor click — most reliable across devices
  const a = document.createElement('a');
  a.href = url;
  a.target = '_blank';
  a.rel = 'noopener noreferrer';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);

  // Detect in-app browsers (LINE, Facebook, IG) and warn
  const ua = navigator.userAgent || '';
  const inApp = /Line|FBAN|FBAV|Instagram|MicroMessenger|Twitter/i.test(ua);
  if (inApp) {
    setTimeout(() => {
      const errBox = document.getElementById('err-box');
      errBox.innerHTML =
        '📱 <strong>กำลังเปิดใน in-app browser</strong><br>' +
        'เพื่อผลลัพธ์ที่ดีที่สุด กด <strong>⋯ → เปิดใน Chrome / Safari</strong> ' +
        'หรือก๊อป link แล้วเปิดใน browser แทนครับ';
      errBox.style.background = '#fff8e1';
      errBox.style.borderColor = '#ffcc80';
      errBox.style.color = '#e65100';
      errBox.style.display = 'block';
    }, 500);
  }
}
</script>
</body>
</html>
