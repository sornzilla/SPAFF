<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Shopee Affiliate Link Generator</title>
<!-- 
**************************************************
Developed by: SORNZiLLATE x Gemini Pro
Objective: Automatically convert Shopee short links to full affiliate links with progress tracking and summary report.
**************************************************
-->
<style>
    /* สไตล์สวยๆ เพื่อให้ใช้งานง่าย */
    body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
    .card { max-width: 500px; margin: auto; border: 1px solid #ccc; padding: 20px; border-radius: 10px; }
    #progress-bar { width: 100%; height: 20px; background: #eee; margin: 10px 0; display: none; }
    #progress-fill { height: 100%; width: 0%; background: #4caf50; transition: width 0.3s; }
</style>
</head>
<body>

<div class="card">
    <h1>🛒 Shopee Aff Generator</h1>
    <textarea id="raw-input" rows="4" style="width: 100%;" placeholder="วางลิงก์ Shopee ที่นี่..."></textarea>
    
    <button onclick="processLink()">แปลงลิงก์เลย!</button>

    <div id="progress-bar"><div id="progress-fill"></div></div>
    <div id="status-msg"></div>
    <div id="summary-area" style="margin-top: 15px; font-weight: bold;"></div>
</div>

<script>
async function processLink() {
    const input = document.getElementById('raw-input').value;
    const progress = document.getElementById('progress-fill');
    const status = document.getElementById('status-msg');
    const summary = document.getElementById('summary-area');

    // 1. แจ้งเตือนเริ่มต้น
    status.innerText = "Starting conversion process...";
    document.getElementById('progress-bar').style.display = "block";
    progress.style.width = "20%";

    // 2. ดึง URL (ใช้ Function เดิมที่คุณมี)
    // จำลองการดึง URL ผ่าน Worker
    progress.style.width = "60%";
    status.innerText = "Fetching full URL via Worker...";

    // สมมติว่าได้ Full URL มาแล้ว
    const fullUrl = "https://shopee.co.th/product/123/456"; 
    const affLink = fullUrl + "?af_id=15385740436"; // เติม ID

    // 3. สรุปผล
    progress.style.width = "100%";
    status.innerText = "Success!";
    summary.innerHTML = `✅ Affiliate Link พร้อมใช้งาน: <br> <a href="${affLink}" target="_blank">${affLink}</a>`;
    
    console.log("--- Summary Report ---");
    console.log("Original: " + input);
    console.log("Final: " + affLink);
}
</script>
</body>
</html>
