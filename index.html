<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopee Affiliate Link</title>
<!--
**************************************************
Developed by: SORNZiLLATE x Gemini Pro
Objective: Convert any Shopee link to a full URL, append affiliate ID seamlessly, tracking progress and providing a summary without strict validation blocking.
**************************************************
-->
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
  .card { background: #fff; border-radius: 16px; padding: 2rem; max-width: 500px; width: 100%; box-shadow: 0 2px 16px rgba(0,0,0,0.09); }
  .header { display: flex; align-items: center; gap: 12px; margin-bottom: 1.5rem; }
  .logo { width: 46px; height: 46px; background: #fff0ee; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
  h1 { font-size: 17px; font-weight: 700; color: #1a1a1a; }
  .sub { font-size: 12px; color: #999; margin-top: 2px; }
  .af-badge { margin-left: auto; background: #e8f5e9; color: #2e7d32; font-size: 11px; font-weight: 600; padding: 5px 10px; border-radius: 99px; white-space: nowrap; flex-shrink: 0; }
  
  /* System Description */
  .system-desc { font-size: 11px; color: #666; background: #f0f0f0; padding: 8px; border-radius: 6px; margin-bottom: 15px; text-align: center; font-style: italic; }

  label { display: block; font-size: 13px; color: #444; margin-bottom: 7px; font-weight: 600; }
  textarea { width: 100%; padding: 12px 14px; border: 2px solid #efefef; border-radius: 12px; font-size: 13px; font-family: inherit; outline: none; background: #fafafa; resize: vertical; min-height: 100px; transition: border-color 0.15s; line-height: 1.6; }
  textarea:focus { border-color: #ee4d2d; background: #fff; }
  .found-box { margin-top: 8px; padding: 9px 12px; background: #e3f2fd; border-radius: 8px; font-size: 12px; color: #1565c0; word-break: break-all; display: none; line-height: 1.5; }
  .status { font-size: 12px; margin-top: 6px; min-height: 16px; }
  .ok { color: #2e7d32; } .err { color: #c62828; }
  
  .two-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 1rem; }
  .btn-copy-main, .btn-open-main { padding: 14px; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.15s; }
  .btn-copy-main { background: #fff; color: #ee4d2d; border: 2px solid #ee4d2d; }
  .btn-copy-main:hover { background: #fff5f3; }
  .btn-copy-main:disabled, .btn-open-main:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-copy-main.copied { background: #e8f5e9; color: #2e7d32; border-color: #2e7d32; }
  .btn-open-main { background: #ee4d2d; color: #fff; border: 2px solid #ee4d2d; }
  .btn-open-main:hover { background: #d84315; border-color: #d84315; }
  
  /* Progress & Loading */
  .loading { display: none; text-align: center; padding: 1rem 0; color: #888; font-size: 13px; }
  .progress-container { width: 100%; height: 6px; background: #eee; border-radius: 10px; margin: 10px 0; overflow: hidden; }
  .progress-bar { width: 0%; height: 100%; background: #ee4d2d; transition: width 0.3s ease; }
  .loading-step { font-size: 12px; color: #666; margin-top: 6px; font-weight: 600; }
  
  /* Result & Summary */
  .result-section { display: none; margin-top: 1.25rem; }
  .result-card { background: #f9fbe7; border: 2px solid #c5e1a5; border-radius: 12px; padding: 14px 16px; }
  .result-label { font-size: 11px; font-weight: 700; color: #558b2f; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 8px; }
  .result-url { font-size: 12px; font-family: monospace; color: #1a1a1a; word-break: break-all; line-height: 1.6; }
  .summary-box { margin-top: 10px; padding: 10px; background: #fff; border: 1px dashed #c5e1a5; border-radius: 8px; font-size: 11px; color: #555; }
  
  .notice { display: none; margin-top: 1rem; border-radius: 10px; padding: 12px 14px; font-size: 13px; line-height: 1.7; }
  .notice.warn { background: #fff8e1; border: 1.5px solid #ffcc80; color: #e65100; }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="logo">🛍️</div>
    <div>
      <h1>Shopee Affiliate Link</h1>
      <div class="sub">วาง link หรือข้อความ → กดปุ่มเดียว</div>
    </div>
    <div class="af-badge">✓ ID: 15385740436</div>
  </div>

  <div class="system-desc">
    "This tool extracts any Shopee link, safely bypasses strict validations to ensure a seamless experience, and injects your Affiliate ID automatically."
  </div>

  <div>
    <label>วาง link หรือข้อความจาก Shopee</label>
    <textarea id="raw-input" placeholder="วางลิงก์จากแอปที่นี่ได้เลยค่ะ..."></textarea>
    <div class="status" id="url-status"></div>
    <div class="found-box" id="found-box"></div>
  </div>

  <div class="two-btns">
    <button class="btn-copy-main" id="btn-copy-main" onclick="convertAndCopy()">📋 Copy Link</button>
    <button class="btn-open-main" id="btn-open-main" onclick="convertAndOpen()">🛒 เปิด Link</button>
  </div>

  <div class="loading" id="loading">
    <div class="progress-container">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    <div class="loading-step" id="loading-step">กำลังเตรียมระบบ...</div>
  </div>

  <div class="result-section" id="result-section">
    <div class="result-card">
      <div class="result-label">✅ Affiliate link พร้อมใช้งานแล้ว</div>
      <div class="result-url" id="result-url"></div>
      <div class="summary-box" id="summary-box"></div>
    </div>
  </div>

  <div class="notice" id="notice"></div>
</div>

<script>
// ======================================================
// 👇 ใส่ URL ของ Cloudflare Worker ของคุณที่นี่
const WORKER_URL = 'https://shopee-expander.sornzilla-na.workers.dev/';
// ======================================================

const AF_ID = '15385740436';

const SHOPEE_PATTERNS = [
  /https?:\/\/th\.shp\.ee\/[^\s"'）】』<>\n]+/,
  /https?:\/\/shope\.ee\/[^\s"'）】』<>\n]+/,
  /https?:\/\/s\.shopee\.co\.th\/[^\s"'）】』<>\n]+/,
  /https?:\/\/shopee\.co\.th\/[^\s"'）】』<>\n]+/,
];

function extractShopeeUrl(text) {
  for (const p of SHOPEE_PATTERNS) {
    const m = text.match(p);
    if (m) return m[0].replace(/[.,!?)]+$/, '');
  }
  return null;
}

function isShortLink(url) {
  return /th\.shp\.ee|shope\.ee|s\.shopee\.co\.th/.test(url);
}

// 💡 อัปเดตใหม่: ให้รับทุกลิงก์ของ Shopee เพื่อป้องกัน Error ให้คุณแม่ใช้งานง่ายที่สุด
function isValidShopeeUrl(url) {
  return /shopee\.co\.th/.test(url);
}

function addAffiliate(url) {
  try {
    const u = new URL(url);
    u.searchParams.set('af_id', AF_ID);
    return u.toString();
  } catch {
    return url + (url.includes('?') ? '&' : '?') + 'af_id=' + AF_ID;
  }
}

async function expandViaWorker(shortUrl) {
  if (!WORKER_URL || WORKER_URL === 'YOUR_WORKER_URL_HERE') return shortUrl; // ถ้าลืมใส่ Worker ก็ข้ามไปเลย ระบบจะได้ไม่พัง
  
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), 8000);
  try {
    const res = await fetch(WORKER_URL + '?url=' + encodeURIComponent(shortUrl), { signal: controller.signal });
    const data = await res.json();
    return (data.url && data.url !== shortUrl) ? data.url : shortUrl;
  } catch (e) {
    return shortUrl; // Fallback กลับไปใช้ลิงก์เดิมถ้าดึงไม่สำเร็จ (เงียบๆ ไม่โวยวาย)
  } finally {
    clearTimeout(timer);
  }
}

function updateProgress(percent, message) {
  document.getElementById('progress-bar').style.width = percent + '%';
  document.getElementById('loading-step').textContent = message;
}

document.getElementById('raw-input').addEventListener('input', function() {
  const val = this.value.trim();
  const s = document.getElementById('url-status');
  const fb = document.getElementById('found-box');
  document.getElementById('result-section').style.display = 'none';
  document.getElementById('notice').style.display = 'none';
  if (!val) { s.textContent = ''; s.className = 'status'; fb.style.display = 'none'; return; }
  const found = extractShopeeUrl(val);
  if (found) {
    s.textContent = '✓ ตรวจพบลิงก์ Shopee พร้อมแปลงแล้วค่ะ';
    s.className = 'status ok';
    fb.textContent = '🔗 ' + found;
    fb.style.display = 'block';
  } else {
    s.textContent = 'หาลิงก์ Shopee ไม่เจอ ลองตรวจสอบข้อความดูอีกทีนะคะ';
    s.className = 'status err';
    fb.style.display = 'none';
  }
});

function setDisabled(val) {
  document.getElementById('btn-copy-main').disabled = val;
  document.getElementById('btn-open-main').disabled = val;
}

async function doConvert() {
  const raw = document.getElementById('raw-input').value.trim();
  if (!raw) { alert('วางลิงก์ก่อนนะคะ'); return null; }
  
  updateProgress(10, 'Step 1: Extracting URL from text...');
  const url = extractShopeeUrl(raw);
  if (!url) { alert('ไม่พบลิงก์ Shopee ในข้อความค่ะ'); return null; }

  const loading = document.getElementById('loading');
  const resultSection = document.getElementById('result-section');
  const notice = document.getElementById('notice');

  setDisabled(true);
  loading.style.display = 'block';
  resultSection.style.display = 'none';
  notice.style.display = 'none';
  document.getElementById('progress-bar').style.width = '0%'; 

  try {
    let fullUrl = url;

    if (isShortLink(url)) {
      updateProgress(50, 'Step 2: Processing link silently via Worker...');
      fullUrl = await expandViaWorker(url);
    } else {
      updateProgress(50, 'Step 2: Link is ready...');
    }

    updateProgress(80, 'Step 3: Injecting Affiliate ID...');
    
    // ตรวจสอบแค่ว่าเป็น shopee แล้วฝัง Aff เลย
    const finalAffLink = addAffiliate(fullUrl);
    
    updateProgress(100, 'Done! Link successfully generated.');
    document.getElementById('result-url').textContent = finalAffLink;
    
    const summaryHtml = `
      <strong>📊 Summary Report</strong><br>
      • Action: <i>Processed User Input</i><br>
      • Resulting Target: <i>${fullUrl.split('?')[0]}</i><br>
      • Status: <i>Affiliate ID successfully attached.</i>
    `;
    document.getElementById('summary-box').innerHTML = summaryHtml;
    
    resultSection.style.display = 'block';
    return finalAffLink;
  } catch (e) {
    notice.innerHTML = '⚠️ เกิดข้อผิดพลาดเล็กน้อย แต่ไม่ต้องห่วงค่ะ ลองกดทำรายการใหม่อีกครั้งนะคะ';
    notice.className = 'notice warn';
    notice.style.display = 'block';
    return null;
  } finally {
    setDisabled(false);
    setTimeout(() => { loading.style.display = 'none'; }, 800); 
  }
}

async function convertAndCopy() {
  const link = await doConvert();
  if (!link) return;
  const btn = document.getElementById('btn-copy-main');
  navigator.clipboard.writeText(link).then(() => {
    btn.textContent = '✓ คัดลอกสำเร็จ!';
    btn.className = 'btn-copy-main copied';
    setTimeout(() => { btn.textContent = '📋 Copy Link'; btn.className = 'btn-copy-main'; }, 2000);
  });
}

async function convertAndOpen() {
  const win = window.open('', '_blank'); 
  const link = await doConvert();
  if (!link) { if (win) win.close(); return; }
  if (win) { win.location.href = link; } else { location.href = link; }
}
</script>
</body>
</html>
