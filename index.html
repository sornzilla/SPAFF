<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopee Affiliate Link</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
  .card { background: #fff; border-radius: 16px; padding: 2rem; max-width: 500px; width: 100%; box-shadow: 0 2px 16px rgba(0,0,0,0.09); }
  .header { display: flex; align-items: center; gap: 12px; margin-bottom: 1.75rem; }
  .logo { width: 46px; height: 46px; background: #fff0ee; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
  h1 { font-size: 17px; font-weight: 700; color: #1a1a1a; }
  .sub { font-size: 12px; color: #999; margin-top: 2px; }
  .af-badge { margin-left: auto; background: #e8f5e9; color: #2e7d32; font-size: 11px; font-weight: 600; padding: 5px 10px; border-radius: 99px; white-space: nowrap; flex-shrink: 0; }
  label { display: block; font-size: 13px; color: #444; margin-bottom: 7px; font-weight: 600; }
  textarea { width: 100%; padding: 12px 14px; border: 2px solid #efefef; border-radius: 12px; font-size: 13px; font-family: inherit; outline: none; background: #fafafa; resize: vertical; min-height: 100px; transition: border-color 0.15s; line-height: 1.6; }
  textarea:focus { border-color: #ee4d2d; background: #fff; }
  .found-box { margin-top: 8px; padding: 9px 12px; background: #e3f2fd; border-radius: 8px; font-size: 12px; color: #1565c0; word-break: break-all; display: none; line-height: 1.5; }
  .status { font-size: 12px; margin-top: 6px; min-height: 16px; }
  .ok { color: #2e7d32; }
  .err { color: #c62828; }

  .btn-main { width: 100%; margin-top: 1rem; padding: 14px; background: #ee4d2d; color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; transition: background 0.15s; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .btn-main:hover { background: #d84315; }
  .btn-main:disabled { background: #ffccbc; cursor: not-allowed; }

  .loading { display: none; text-align: center; padding: 1.5rem 0; color: #888; font-size: 14px; }
  .spinner { display: inline-block; width: 22px; height: 22px; border: 3px solid #eee; border-top-color: #ee4d2d; border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 8px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .result-section { display: none; margin-top: 1.25rem; }
  .result-card { background: #f9fbe7; border: 2px solid #c5e1a5; border-radius: 12px; padding: 14px 16px; }
  .result-label { font-size: 11px; font-weight: 700; color: #558b2f; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 8px; }
  .result-url { font-size: 12px; font-family: monospace; color: #1a1a1a; word-break: break-all; line-height: 1.6; }
  .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }
  .btn-open { padding: 12px; background: #ee4d2d; color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; transition: background 0.15s; }
  .btn-open:hover { background: #d84315; }
  .btn-copy { padding: 12px; background: #fff; color: #555; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
  .btn-copy:hover { border-color: #ee4d2d; color: #ee4d2d; }
  .btn-copy.copied { border-color: #2e7d32; color: #2e7d32; }

  .err-box { display: none; margin-top: 1rem; background: #fce4ec; border: 1.5px solid #f48fb1; border-radius: 10px; padding: 12px 14px; font-size: 13px; color: #880e4f; line-height: 1.6; }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="logo">🛍️</div>
    <div>
      <h1>Shopee Affiliate Link</h1>
      <div class="sub">วาง link หรือข้อความ → กดปุ่มเดียว</div>
    </div>
    <div class="af-badge">✓ ID: 15385740436</div>
  </div>

  <div>
    <label>วาง link หรือข้อความจาก Shopee</label>
    <textarea id="raw-input" placeholder="วางได้ทุกรูปแบบ เช่น&#10;https://th.shp.ee/pJc99Pr&#10;หรือข้อความแชร์ยาวๆ ที่มี link อยู่ด้านใน"></textarea>
    <div class="status" id="url-status"></div>
    <div class="found-box" id="found-box"></div>
  </div>

  <button class="btn-main" id="convert-btn" onclick="convert()">
    🔗 แปลงและเปิดสินค้า
  </button>

  <div class="loading" id="loading">
    <span class="spinner"></span> กำลังดึง link จริง รอแป๊บนึงนะครับ...
  </div>

  <div class="result-section" id="result-section">
    <div class="result-card">
      <div class="result-label">✅ Affiliate link พร้อมแล้ว</div>
      <div class="result-url" id="result-url"></div>
      <div class="actions">
        <button class="btn-open" onclick="openProduct()">🛒 เปิดสินค้าเลย</button>
        <button class="btn-copy" id="copy-btn" onclick="copyLink()">📋 คัดลอก link</button>
      </div>
    </div>
  </div>

  <div class="err-box" id="err-box"></div>
</div>

<script>
const AF_ID = '15385740436';
let finalAffLink = '';

const SHOPEE_PATTERNS = [
  /https?:\/\/th\.shp\.ee\/[^\s"'）】』<>.,!?]+/,
  /https?:\/\/shope\.ee\/[^\s"'）】』<>.,!?]+/,
  /https?:\/\/s\.shopee\.co\.th\/[^\s"'）】』<>.,!?]+/,
  /https?:\/\/shopee\.co\.th\/[^\s"'）】』<>.,!?]+/,
  /https?:\/\/[\w.-]*shopee[\w.-]*\/[^\s"'）】』<>.,!?]+/,
];

function extractShopeeUrl(text) {
  for (const p of SHOPEE_PATTERNS) {
    const m = text.match(p);
    if (m) return m[0];
  }
  return null;
}

function isShortLink(url) {
  return /th\.shp\.ee|shope\.ee|s\.shopee\.co\.th\/[A-Za-z0-9]+$/.test(url);
}

function addAffiliate(url) {
  try {
    const u = new URL(url);
    u.searchParams.set('af_id', AF_ID);
    return u.toString();
  } catch {
    return url + (url.includes('?') ? '&' : '?') + 'af_id=' + AF_ID;
  }
}

async function expandShortUrl(shortUrl) {
  const proxyUrl = 'https://api.allorigins.win/get?url=' + encodeURIComponent(shortUrl);
  const res = await fetch(proxyUrl);
  const data = await res.json();
  if (data && data.status && data.status.url) {
    return data.status.url;
  }
  throw new Error('ดึง link ไม่ได้');
}

document.getElementById('raw-input').addEventListener('input', function() {
  const val = this.value.trim();
  const s = document.getElementById('url-status');
  const fb = document.getElementById('found-box');
  document.getElementById('result-section').style.display = 'none';
  document.getElementById('err-box').style.display = 'none';
  if (!val) { s.textContent = ''; s.className = 'status'; fb.style.display = 'none'; return; }
  const found = extractShopeeUrl(val);
  if (found) {
    s.textContent = isShortLink(found) ? '✓ พบ short link — จะดึง link จริงให้อัตโนมัติ' : '✓ พบ link สินค้า Shopee';
    s.className = 'status ok';
    fb.textContent = '🔗 ' + found;
    fb.style.display = 'block';
  } else {
    s.textContent = 'ไม่พบ link ของ Shopee ในข้อความนี้';
    s.className = 'status err';
    fb.style.display = 'none';
  }
});

async function convert() {
  const raw = document.getElementById('raw-input').value.trim();
  if (!raw) { alert('กรุณาวาง link หรือข้อความก่อนนะครับ'); return; }
  const url = extractShopeeUrl(raw);
  if (!url) { alert('ไม่พบ link ของ Shopee ในข้อความนี้'); return; }

  const btn = document.getElementById('convert-btn');
  const loading = document.getElementById('loading');
  const resultSection = document.getElementById('result-section');
  const errBox = document.getElementById('err-box');

  btn.disabled = true;
  loading.style.display = 'block';
  resultSection.style.display = 'none';
  errBox.style.display = 'none';

  try {
    let fullUrl = url;
    if (isShortLink(url)) {
      fullUrl = await expandShortUrl(url);
      if (!fullUrl || !fullUrl.includes('shopee')) {
        fullUrl = url;
      }
    }
    finalAffLink = addAffiliate(fullUrl);
    document.getElementById('result-url').textContent = finalAffLink;
    resultSection.style.display = 'block';
    document.getElementById('copy-btn').textContent = '📋 คัดลอก link';
    document.getElementById('copy-btn').className = 'btn-copy';
  } catch (e) {
    errBox.innerHTML = '⚠️ ดึง link ไม่ได้ในตอนนี้ ลองเปิด short link ในเบราว์เซอร์แล้ว copy URL ที่ยาวขึ้นมาวางแทนได้ครับ<br><small style="color:#ad1457">(' + e.message + ')</small>';
    errBox.style.display = 'block';
  } finally {
    btn.disabled = false;
    loading.style.display = 'none';
  }
}

function openProduct() {
  if (finalAffLink) window.open(finalAffLink, '_blank');
}

function copyLink() {
  if (!finalAffLink) return;
  navigator.clipboard.writeText(finalAffLink).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = '✓ คัดลอกแล้ว!';
    btn.className = 'btn-copy copied';
    setTimeout(() => {
      btn.textContent = '📋 คัดลอก link';
      btn.className = 'btn-copy';
    }, 2000);
  });
}
</script>
</body>
</html>
